services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: incident_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    command: >
      sh -lc "pip install --no-cache-dir -e '.[dev]' &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ..:/workspace
    ports:
      - "8000:8000"
    environment:
      IAS_DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/incident_db
      IAS_OPENSEARCH_URL: http://opensearch:9200
      IAS_MINIO_ENDPOINT: http://minio:9000
      IAS_REDIS_URL: redis://redis:6379/0
      IAS_RAW_ARTIFACT_STORAGE_BACKEND: minio
      IAS_MINIO_ACCESS_KEY: minio
      IAS_MINIO_SECRET_KEY: minio123
      IAS_MINIO_BUCKET: incident-raw-artifacts
      IAS_GENERATED_OUTPUT_BUCKET: incident-generated-outputs
      IAS_MINIO_SECURE: "false"
    depends_on:
      - postgres
      - opensearch
      - minio
      - redis

  web:
    image: node:22
    working_dir: /workspace
    command: >
      sh -lc "npm install &&
      npm run dev --workspace @incident-attribution/web -- --host 0.0.0.0 --port 5173"
    volumes:
      - ..:/workspace
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
