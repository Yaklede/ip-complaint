version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: incident_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    image: python:3.12-slim
    working_dir: /workspace
    command: bash -lc "echo 'Implement apps/api and replace this placeholder command.' && sleep infinity"
    volumes:
      - ..:/workspace
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - opensearch
      - minio
      - redis

  web:
    image: node:22
    working_dir: /workspace
    command: bash -lc "echo 'Implement apps/web and replace this placeholder command.' && sleep infinity"
    volumes:
      - ..:/workspace
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
